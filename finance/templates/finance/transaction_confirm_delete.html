{% extends "finance/base.html" %}

{% block title %}Удаление записи — Финансовый учёт{% endblock %}

{% block content %}
<h1>Удалить запись</h1>

<p>Вы уверены, что хотите удалить запись от {{ object.date }} — {{ object.get_type_display }} на {{ object.amount }} ₽?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'transaction_list' %}" class="btn">Отмена</a>
</form>
{% endblock %}
